name: CI

on:
  pull_request:
    branches: [main]
  workflow_call: # позволяет release.yml запускать эти же тесты

jobs:
  tests:
    name: 'Ruff + pytest'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Установка uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Зависимости (строго по uv.lock, с dev-группой)
        run: uv sync --frozen

      - name: Линтер
        run: uv run ruff check .

      - name: Тесты
        run: uv run pytest
